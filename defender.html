<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kiryxawxmx - Защитник Windows</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
        -webkit-app-region: drag;
      }

      button,
      .btn,
      .container,
      .window-btn {
        -webkit-app-region: no-drag;
      }

      .title-bar {
        position: fixed;
        top: 0;
        right: 0;
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        z-index: 1000;
      }

      .window-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.3s ease;
        color: white;
      }

      .window-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.05);
      }

      .window-btn.close:hover {
        background: #ef4444;
        color: white;
      }

      body::before {
        content: "";
        position: absolute;
        width: 300px;
        height: 300px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        top: -150px;
        right: -150px;
      }

      body::after {
        content: "";
        position: absolute;
        width: 200px;
        height: 200px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        bottom: -100px;
        left: -100px;
      }

      .container {
        background: white;
        border-radius: 30px;
        padding: 50px;
        max-width: 550px;
        width: 100%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        position: relative;
        z-index: 1;
        animation: slideIn 0.5s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .shield-icon {
        width: 100px;
        height: 100px;
        margin: 0 auto 30px;
        background: linear-gradient(135deg, #ff6b6b 0%, #c92a2a 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(201, 42, 42, 0.3);
        transition: all 0.3s ease;
      }

      .shield-icon.success {
        background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        box-shadow: 0 10px 30px rgba(72, 187, 120, 0.3);
      }

      .shield-icon span {
        font-size: 50px;
        filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.2));
      }

      h1 {
        color: #1a1a1a;
        text-align: center;
        margin-bottom: 15px;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .warning-box {
        background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%);
        border-left: 4px solid #e53e3e;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
      }

      .warning-box.success {
        background: linear-gradient(135deg, #f0fff4 0%, #c6f6d5 100%);
        border-left-color: #48bb78;
      }

      .warning-title {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        color: #c53030;
        font-weight: 600;
        font-size: 16px;
      }

      .warning-box.success .warning-title {
        color: #2f855a;
      }

      .warning-title span {
        margin-right: 10px;
        font-size: 20px;
      }

      .warning-text {
        color: #2d3748;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 8px;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        width: 100%;
        padding: 16px 24px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
      }

      .btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .btn:hover::before {
        width: 300px;
        height: 300px;
      }

      .btn span {
        position: relative;
        z-index: 1;
      }

      .btn-primary {
        background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(229, 62, 62, 0.4);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(229, 62, 62, 0.5);
      }

      .btn-secondary {
        background: #f7fafc;
        color: #4a5568;
        border: 2px solid #e2e8f0;
      }

      .btn-secondary:hover {
        background: white;
        border-color: #cbd5e0;
        transform: translateY(-2px);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
      }

      .progress-container {
        margin: 20px 0;
        display: none;
      }

      .progress-container.show {
        display: block;
      }

      .progress-bar {
        width: 100%;
        height: 8px;
        background: #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #e53e3e 0%, #c53030 100%);
        border-radius: 10px;
        width: 0%;
        transition: width 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .progress-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shimmer 1.5s infinite;
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .progress-text {
        text-align: center;
        color: #4a5568;
        font-size: 14px;
        font-weight: 500;
      }

      .status-container {
        margin-top: 20px;
        border-radius: 12px;
        overflow: hidden;
      }

      #statusLog {
        padding: 16px;
        background: #f7fafc;
        border-radius: 12px;
        display: none;
        animation: fadeIn 0.3s;
      }

      #statusLog.show {
        display: block;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .status-message {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #4a5568;
      }

      .loader {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #e2e8f0;
        border-top: 2px solid #e53e3e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .success-icon {
        color: #48bb78;
        font-size: 20px;
      }

      .error-icon {
        color: #f56565;
        font-size: 20px;
      }

      .footer {
        text-align: center;
        margin-top: 30px;
        color: #a0aec0;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="shield-icon" id="shieldIcon">
        <span>🛡️</span>
      </div>

      <h1 id="mainTitle">Защитник Windows активен</h1>
      <div class="subtitle" id="subtitle">Требуется действие</div>

      <div class="warning-box" id="warningBox">
        <div class="warning-title" id="warningTitle">
          <span>⚠️</span>
          <span>Внимание</span>
        </div>
        <div class="warning-text" id="warningText">
          Защитник Windows в реальном времени включен и может мешать работе
          некоторых функций программы.
        </div>
        <div class="warning-text">
          Для корректной работы рекомендуется временно отключить защиту в
          реальном времени.
        </div>
      </div>

      <div class="button-group" id="buttonGroup">
        <button class="btn btn-primary" id="disableDefenderBtn">
          <span>🔓</span>
          <span>Отключить защитник и продолжить</span>
        </button>
      </div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Подготовка...</div>
      </div>

      <div class="status-container">
        <div id="statusLog"></div>
      </div>

      <div class="footer">kiryxawxmx v1.0.0</div>
    </div>
    <div class="title-bar">
      <button class="window-btn" id="minimizeBtn" title="Свернуть">
        <span>─</span>
      </button>
      <button class="window-btn close" id="closeBtn" title="Закрыть">
        <span>✕</span>
      </button>
    </div>
    <script src="defender-renderer.js"></script>
  </body>
</html>
