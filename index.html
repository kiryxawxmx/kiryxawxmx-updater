<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>PC Setup Tool</title>
    <link rel="stylesheet" href="./assets/tailwind.css" />
  </head>
  <body class="bg-gray-100 text-gray-800 p-8 font-sans">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-3xl font-bold mb-6">🚀 PC Setup Tool</h1>

      <div class="mb-4">
        <button
          id="startBtn"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
        >
          Запустить настройку
        </button>
      </div>

      <textarea
        id="log"
        readonly
        class="w-full h-64 p-4 border rounded-lg bg-gray-50 font-mono"
      ></textarea>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
